  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink:#0a0b0c; --cream:#f0ebe0; --cream2:#c8bfad; --r:18px; }

    html, body { width:100%; height:100%; background:var(--ink); overflow:hidden; }
    body { padding:10px; }

    .hero { display:flex; width:calc(100vw - 20px); height:calc(100vh - 20px); height:calc(100dvh - 20px); gap:10px; }

    /* LEFT */
    .hero__left { position:relative; flex:1; border-radius:var(--r); overflow:hidden; }
    .hero__left__bg {
      position:absolute; inset:0;
      background-image:url('assets/images/salle-banquettes.jpg');
      background-size:cover; background-position:center 52%;
      transform:scale(1.02); transition:transform 8s ease;
    }
    .hero__left:hover .hero__left__bg { transform:scale(1.06); }
    .hero__left__overlay {
      position:absolute; inset:0;
      background:
        linear-gradient(to top,   rgba(0,0,0,.78) 0%, rgba(0,0,0,.1) 50%, transparent 100%),
        linear-gradient(to right, rgba(0,0,0,.35) 0%, transparent 60%),
        linear-gradient(to bottom,rgba(0,0,0,.4)  0%, transparent 30%);
    }

    /* NAV PILL */
    .nav {
      position:absolute; top:20px; left:20px; z-index:10;
      display:inline-flex; align-items:center; gap:4px;
      padding:9px 12px 9px 16px;
      background:rgba(8,7,6,.58); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      border:1px solid rgba(240,235,224,.1); border-radius:999px;
      box-shadow:0 4px 24px rgba(0,0,0,.35);
      animation:fadeDown .7s .05s cubic-bezier(.16,1,.3,1) both;
    }
    .nav__burger { display:flex; flex-direction:column; gap:4.5px; cursor:pointer; padding:4px 6px; border-radius:999px; transition:background .2s; }
    .nav__burger:hover { background:rgba(240,235,224,.08); }
    .nav__burger span { display:block; width:18px; height:1.5px; background:var(--cream); }
    .nav__logo { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:19px; letter-spacing:.26em; color:var(--cream); text-transform:uppercase; padding:0 4px 0 6px; text-decoration:none; }
    .nav__sep { width:1px; height:15px; background:rgba(240,235,224,.14); margin:0 6px; flex-shrink:0; }
    .nav__links { display:flex; align-items:center; gap:2px; list-style:none; }
    .nav__links a { display:block; font-family:'Jost',sans-serif; font-weight:300; font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:rgba(240,235,224,.58); text-decoration:none; padding:7px 13px; border-radius:999px; transition:background .2s, color .2s; white-space:nowrap; }
    .nav__links a:hover { color:var(--cream); background:rgba(240,235,224,.1); }
    .nav__links a.active { color:var(--cream); background:rgba(240,235,224,.14); }

    /* HEADLINE */
    .hero__headline { position:absolute; bottom:48px; left:36px; z-index:10; line-height:.88; }
    .hero__headline h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(62px,8.5vw,108px); letter-spacing:-.01em; text-transform:uppercase; color:var(--cream); display:flex; flex-direction:column; text-shadow:0 2px 20px rgba(0,0,0,.5); }
    .hero__headline h1 .hl-1 { display:block; animation:headlineFade 2.2s 0.6s ease both; }
    .hero__headline h1 .hl-2 { display:block; animation:headlineFade 2.2s 1.1s ease both; }
    @keyframes headlineFade { from{opacity:0} to{opacity:1} }

    /* SOCIAL */
    .hero__social { position:absolute; bottom:52px; right:36px; z-index:10; display:flex; gap:18px; align-items:center; animation:fadeUp .7s .35s cubic-bezier(.16,1,.3,1) both; }
    .hero__social a { color:rgba(240,235,224,.45); transition:color .2s; text-decoration:none; display:flex; }
    .hero__social a:hover { color:var(--cream); }
    .hero__social svg { width:15px; height:15px; fill:currentColor; }

    /* RIGHT STRIP */
    .hero__right { width:min(27vw,350px); display:flex; flex-direction:column; flex-shrink:0; gap:10px; animation:revealR .85s .1s cubic-bezier(.16,1,.3,1) both; }

    /* PANELS */
    .panel { position:relative; flex:1; border-radius:var(--r); overflow:hidden; cursor:pointer; background:var(--ink); display:block; text-decoration:none; }
    .panel__photo { position:absolute; inset:0; background-size:cover; background-position:center; transition:transform .7s cubic-bezier(.25,.46,.45,.94); }
    .panel:hover .panel__photo { transform:scale(1.05); }
    .panel--menu    .panel__photo { background-image:url('assets/images/langouste-pasta.jpg'); background-position:center; }
    .panel--resy    .panel__photo { background-image:url('assets/images/resy-ambiance.jpg'); background-position:center 30%; }
    .panel--resto   .panel__photo { background-image:url('assets/images/salle-table.jpg'); background-position:center; }
    .panel__overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.35) 55%, rgba(0,0,0,.08) 100%); }
    .panel__label { position:absolute; bottom:16px; right:18px; z-index:5; display:flex; align-items:center; gap:8px; font-family:'Jost',sans-serif; font-weight:300; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--cream2); transition:color .2s, gap .25s; text-shadow:0 1px 8px rgba(0,0,0,.7); }
    .panel:hover .panel__label { color:var(--cream); gap:13px; }
    .panel__label .arr { font-size:13px; transition:transform .25s; }
    .panel:hover .panel__label .arr { transform:translateX(3px); }

    /* ANIMATIONS */
    .hero__left { animation:revealL .85s cubic-bezier(.16,1,.3,1) both; }
    @keyframes revealL  { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
    @keyframes revealR  { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(22px)}  to{opacity:1;transform:translateY(0)} }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 900px) {
      .hero__right { width: min(32vw, 280px); }
      .hero__headline h1 { font-size: clamp(48px, 8vw, 80px); }
    }

    @media (max-width: 700px) {
      html, body { overflow: hidden; height: 100%; }
      body { padding: 8px; }
      .hero { flex-direction: column; width: calc(100vw - 16px); height: calc(100vh - 16px); height: calc(100dvh - 16px); gap: 8px; }
      .hero__left { flex: 7; min-height: 0; }
      .hero__right { flex: 3; min-height: 0; width: 100%; flex-direction: row; gap: 8px; }
      .panel__label { font-size: 9px; bottom: 10px; right: 12px; }
      .nav { padding: 8px 10px 8px 12px; gap: 2px; }
      .nav__logo { font-size: 16px; letter-spacing: .2em; }
      .nav__sep { margin: 0 4px; }
      .nav__links a { padding: 6px 8px; font-size: 9.5px; letter-spacing: .12em; }
      .hero__headline { bottom: 36px; left: 24px; }
      .hero__headline h1 { font-size: clamp(44px, 13vw, 68px); }
      .hero__social { bottom: 36px; right: 20px; gap: 14px; }
    }

    @media (max-width: 480px) {
      /* Navbar : réduire la taille pour que tout tienne */
      .nav { padding: 7px 9px 7px 12px; gap: 2px; }
      .nav__logo { font-size: 13px; letter-spacing: .15em; }
      .nav__sep { margin: 0 3px; }
      .nav__links a { font-size: 8px; letter-spacing: .09em; padding: 5px 6px; }

      /* Panneaux droits : plus de hauteur pour les labels sur 2 lignes */
      .hero__right { height: 120px; }

      /* Panel labels : police d'origine, retour à la ligne, gap avec les bords */
      .panel__label {
        bottom: 12px; left: 12px; right: 12px;
        letter-spacing: .06em;
        flex-direction: column; align-items: flex-start;
        gap: 3px; overflow-wrap: break-word;
      }

      /* Titre + icônes sociales : séparation verticale */
      .hero__headline { bottom: 52px; left: 20px; }
      .hero__headline h1 { font-size: clamp(34px, 11vw, 50px); }
      .hero__social { bottom: 14px; right: 16px; gap: 12px; }
    }

    /* ── BURGER → CROIX ──────────────────────────────────── */
    .nav__burger span { transition: transform .35s cubic-bezier(.16,1,.3,1), opacity .25s; }
    .nav__burger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4.5px); }
    .nav__burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav__burger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4.5px); }
    .nav__burger:not(.open):hover span:nth-child(1) { transform: translateY(6px); }
    .nav__burger:not(.open):hover span:nth-child(3) { transform: translateY(-6px); }

    /* ── OVERLAY NAVIGATION ──────────────────────────────── */
    .nav-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(10,11,12,.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .4s cubic-bezier(.16,1,.3,1);
    }
    .nav-overlay.open { opacity: 1; pointer-events: all; }

    .nav-overlay__close {
      position: absolute; top: 20px; left: 20px;
      width: 44px; height: 40px;
      background: rgba(8,7,6,.58); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(240,235,224,.1); border-radius: 999px;
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
      cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .nav-overlay__close span {
      position: absolute; display: block; width: 18px; height: 1.5px; background: var(--cream);
    }
    .nav-overlay__close span:nth-child(1) { transform: rotate(45deg); }
    .nav-overlay__close span:nth-child(2) { transform: rotate(-45deg); }

    .nav-overlay__links { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; padding: 0 20px; }
    .nav-overlay__links a { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(28px,8vw,50px); letter-spacing:.05em; text-transform:uppercase; color:var(--cream); text-decoration:none; opacity:.45; display:block; text-align:center; width:100%; position:relative; overflow:hidden; line-height:1.12; transition:opacity .4s cubic-bezier(.16,1,.3,1); }
    .nav-overlay__links a.active { opacity:.9; }
    .nav-overlay__links a:hover { opacity:1; }
    .nav-overlay__links a span { display:block; transition:transform .52s cubic-bezier(.16,1,.3,1); }
    .nav-overlay__links a::after { content:attr(data-label); position:absolute; left:0; top:100%; width:100%; text-align:center; font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(28px,8vw,50px); letter-spacing:.05em; text-transform:uppercase; color:var(--cream); transition:transform .52s cubic-bezier(.16,1,.3,1); }
    .nav-overlay__links a:hover span { transform:translateY(-100%); }
    .nav-overlay__links a:hover::after { transform:translateY(-100%); }
    .nav-overlay__links a.is-leaving span { transform:translateY(-100%); }
    .nav-overlay__links a.is-leaving::after { transform:translateY(-100%); }
    /* ── ACCESSIBILITÉ ──────────────────────────────────── */
    .skip-link { position:absolute; top:-100%; left:16px; z-index:99999; padding:10px 18px; background:var(--cream); color:var(--ink); font-family:'Jost',sans-serif; font-weight:600; font-size:13px; letter-spacing:.05em; border-radius:6px; text-decoration:none; transition:top .15s; }
    .skip-link:focus { top:8px; }
    :focus-visible { outline:2px solid var(--gold); outline-offset:3px; border-radius:4px; }
    @media (prefers-reduced-motion: reduce) {
      .nav-overlay { transition:none; }
      .nav-overlay__links a span, .nav-overlay__links a::after { transition:none; }
    }
  </style>
</head>

<script>
(function(){
  var burger  = document.querySelector('.nav__burger');
  var overlay = document.getElementById('navOverlay');
  function openMenu()  { burger.classList.add('open');    burger.setAttribute('aria-expanded','true');  overlay.classList.add('open');    document.body.style.overflow='hidden'; }
  function closeMenu() { burger.classList.remove('open'); burger.setAttribute('aria-expanded','false'); overlay.classList.remove('open'); document.body.style.overflow=''; }
  function toggle()    { overlay.classList.contains('open') ? closeMenu() : openMenu(); }
  burger.addEventListener('click', toggle);
  document.querySelector('.nav-overlay__close').addEventListener('click', closeMenu);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) closeMenu(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });
  var reduceMotionNav = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  document.querySelectorAll('.nav-overlay__links a[href]').forEach(function(link) {
    link.addEventListener('click', function(e) {
      var href = this.getAttribute('href');
      if (!href || href.charAt(0) === '#') return;
      e.preventDefault();
      this.classList.add('is-leaving');
      var dest = href;
      setTimeout(function() { window.location.href = dest; }, reduceMotionNav ? 0 : 500);
    });
  });
})();
</script>
